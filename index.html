<!DOCTYPE HTML>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ragnarok Arena | E-Sport Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main_content">
        <div class="form_box">
            <div class="form_title">
                RAGNARÖK ARENA E-SPORT REGISTRATION
            </div>
            <div class="form_content">
                <form action="#" method="post">
                    <div class="separator"></div>
                    
                    <label class="form_label">Team Name</label>
                    <input type="text" name="team_name" class="form_textbox" placeholder="Enter your team name" required>
                    
                    <div class="separator"></div>

                    <label class="form_label">Captain</label>
                    <input type="text" name="captain_name" class="form_textbox_short" placeholder="Full Name">
                    <input type="email" name="email" class="form_textbox_short" placeholder="Email Address">
                    
                    <div class="separator"></div>

                    <label class="form_label">Game</label>
                    <select name="game_title" class="form_textbox">
                        <option value="">Select Tournament...</option>
                        <option value="mlbb">Mobile Legends</option>
                        <option value="pubg">PUBG Mobile</option>
                        <option value="valorant">Valorant</option>
                        <option value="freefire">Free Fire</option>
                    </select>
                    
                    <div class="separator"></div>

                    <label class="form_label">Phone</label>
                    <input type="tel" name="phone_number" class="form_textbox" placeholder="0812xxxxxxx">
                    
                    <div class="separator"></div>

                    <label class="form_label">Payment</label>
                    <input type="file" name="payment_proof" class="form_file_input">
                    <small style="color: #888; display: block; margin-left: 103px;">*Upload your transaction proof (JPG/PNG/PDF)</small>
                    
                    <div class="separator"></div>

                    <div style="margin-top: 20px;">
                        <input type="checkbox" id="privacy" name="privacy_policy" required style="cursor: pointer;">
                        <label for="privacy" style="font-weight: bold; color: #ff4500; cursor: pointer; margin-left: 10px;">
                            I agree to the Terms, Conditions, and Privacy Policy of Ragnarok Arena.
                        </label>
                    </div>
                    
                    <div class="separator"></div>

                    <input type="submit" value="JOIN TOURNAMENT" class="form_button_neon">
                </form>
            </div>
        </div>
    </div>
</body>
</html>
